name: Deploy FastShiftArray TypeDoc to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Build TypeDoc site
        run: npm run gen-docs

      - name: Verify TypeDoc output
        run: |
          test -f docs/index.html
          test -d docs/assets
          test -d docs/classes

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - id: deployment
        uses: actions/deploy-pages@v4
