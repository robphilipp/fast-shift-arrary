name: Deploy FastShiftArray TypeDoc to github pages
on:
  push:
    branches: [ main ]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - run: npx typedoc ./index.ts
      - uses: actions/upload-pages-artifact@v3
        with: { path: docs/ } # Matches "out" in typedoc.json
      - id: deployment
        uses: actions/deploy-pages@v4
